<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Sympl Finance</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" href="Dark.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="Dark.svg">
<meta name="theme-color" content="#002236">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400;1,500;1,600&display=swap">
<link rel="stylesheet" href="sympl-components.css?v=2">
<script src="sympl-components.js?v=2" defer></script>
<style>
:root{
  --inkwell:#002236; --deepwater:#00706E; --underbrush:#003C32;
  --bay:#65C1BF; --seaglass:#C2E6E1; --mist:#E0F2F0;
  --yolk:#FFE079; --buttercup:#FFF5AB; --harvest:#E38900;
  --paper:#FBF5F0; --tan:#F8EEE3;
  --ink-soft:#4a5f6b; --line:rgba(0,34,54,0.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Onest',sans-serif;background:var(--paper);color:var(--inkwell);line-height:1.6;-webkit-font-smoothing:antialiased;}
a{color:inherit;}
.wrap{max-width:1200px;margin:0 auto;padding:0 32px;}
.kicker{font-size:13px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--deepwater);margin-bottom:14px;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 26px;border-radius:100px;font-family:'Onest',sans-serif;font-size:15px;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:transform .2s, background .2s, color .2s;}
.btn:hover{transform:translateY(-1px);}
.btn-yolk{background:var(--yolk);color:var(--inkwell);}
.btn-yolk:hover{background:var(--harvest);color:#fff;}
.btn-ghost{background:transparent;color:var(--inkwell);border:1.5px solid rgba(0,34,54,0.18);}
.btn-ghost:hover{border-color:var(--inkwell);}
.btn:focus-visible{outline:3px solid var(--bay);outline-offset:2px;}

/* ── NAV (matches site) ── */
/* ── 404 BODY ── */
.notfound{padding:clamp(64px,12vh,120px) 0;text-align:center;}
.notfound-code{font-family:'Lora',serif;font-style:italic;font-weight:600;font-size:clamp(64px,12vw,120px);line-height:1;color:var(--seaglass);}
.notfound h1{font-size:clamp(28px,4vw,40px);font-weight:800;letter-spacing:-0.02em;margin:8px 0 14px;}
.notfound p{font-size:16px;color:var(--ink-soft);max-width:460px;margin:0 auto 32px;}
.notfound-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.notfound-links{margin-top:44px;padding-top:32px;border-top:1px solid var(--line);display:flex;gap:10px 28px;justify-content:center;flex-wrap:wrap;font-size:14px;}
.notfound-links a{color:var(--deepwater);font-weight:600;text-decoration:none;}
.notfound-links a:hover{text-decoration:underline;}
</style>
</head>
<body>

<sympl-nav></sympl-nav>

<main>
  <section class="notfound">
    <div class="wrap">
      <p class="notfound-code" aria-hidden="true">404</p>
      <h1>This page wandered off.</h1>
      <p>The page you're looking for may have moved, been renamed, or never existed. Let's get you back on track.</p>
      <div class="notfound-actions">
        <a href="/" class="btn btn-yolk">Back to homepage</a>
        <a href="sympl-contact" class="btn btn-ghost">Contact us</a>
      </div>
      <div class="notfound-links">
        <a href="sympl-bookkeeping">Bookkeeping</a>
        <a href="sympl-payroll">Payroll</a>
        <a href="sympl-cfo-advisory">CFO &amp; Advisory</a>
        <a href="sympl-blog">Blog</a>
        <a href="sympl-quote">Get a quote</a>
      </div>
    </div>
  </section>
</main>

<sympl-footer></sympl-footer>

</body>
</html>
